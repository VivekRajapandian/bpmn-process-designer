<main class="workspace">
  <app-toolbar
    [status]="workflow.status"
    (newDiagram)="newDiagram()"
    (importDiagram)="importDiagram($event)"
    (exportDiagram)="exportDiagram()"
    (save)="saveLocally()"
    (validate)="validate()"
    (undo)="undo()"
    (redo)="redo()"
    (zoomIn)="zoomIn()"
    (zoomOut)="zoomOut()"
  />

  <section class="body" [class.properties-hidden]="tokenSimulationActive">
    <app-workflow-explorer
      [workflows]="samples"
      [activeWorkflowId]="workflow.id"
      [deletableWorkflowIds]="deletableWorkflowIds"
      (workflowSelected)="selectWorkflow($event)"
      (workflowDeleted)="deleteWorkflow($event)"
    />

    <section class="modeler" [class.play-mode-active]="activeMode === 'play'">
      <div class="canvas-header">
        <div>
          <div class="title-row">
            <h1>Workflow: {{ workflow.name }}</h1>
            <button type="button" class="rename-button" (click)="renameWorkflow()">
              Rename
            </button>
          </div>
          <p>{{ workflow.description }}</p>
        </div>
        <div class="workspace-meta">
          <span class="engine-label">Engine: {{ engineLabel(workflow.engineType) }}</span>
          <span *ngIf="saveMessage" class="save-message">{{ saveMessage }}</span>
          <span>Updated {{ workflow.updatedAt | date: 'short' }}</span>
        </div>
      </div>

      <div class="mode-bar">
        <nav class="mode-tabs" aria-label="Modeler mode">
          <button
            type="button"
            [class.active]="activeMode === 'design'"
            (click)="setWorkspaceMode('design')"
          >
            Design
          </button>
          <button
            type="button"
            [class.active]="activeMode === 'play'"
            (click)="setWorkspaceMode('play')"
          >
            Play mode
          </button>
        </nav>

        <button
          type="button"
          class="token-toggle"
          [class.active]="tokenSimulationActive"
          [attr.aria-pressed]="tokenSimulationActive"
          (click)="toggleTokenSimulation()"
        >
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
          Token simulation
        </button>
      </div>

      <div class="play-options" *ngIf="activeMode === 'play'">
        <label class="auto-complete-option">
          <input
            type="checkbox"
            [checked]="taskHandlingMode === 'auto-complete'"
            (change)="setAutoComplete($any($event.target).checked)"
          />
          Auto-complete
        </label>
      </div>

      <app-runtime-status *ngIf="activeMode === 'play'" />

      <div class="canvas-shell" [class.canvas-blocked]="isCanvasBlocked()">
        <app-bpmn-canvas />
        <div class="canvas-blocker" *ngIf="isCanvasBlocked()" aria-live="polite">
          <span
            class="canvas-blocker-spinner"
            *ngIf="activeMode === 'play' && runtimeStatus.state === 'deploying'"
            aria-hidden="true"
          ></span>
          {{ getCanvasBlockMessage() }}
        </div>
      </div>

      <app-problems-panel
        [problems]="problems"
        (problemSelected)="focusProblem($event)"
      />
    </section>

    <aside class="right-panel" [class.hidden-by-simulation]="tokenSimulationActive">
      <div class="tabs" role="tablist" aria-label="Inspector panels">
        <button
          type="button"
          [class.active]="activePanel === 'properties'"
          (click)="setPanel('properties')"
        >
          Properties
        </button>
        <button
          type="button"
          [class.active]="activePanel === 'xml'"
          (click)="setPanel('xml')"
        >
          XML
        </button>
      </div>

      <div class="panel-content" [class.hidden]="activePanel !== 'properties'">
        <app-properties-panel />
      </div>
      <div class="panel-content" [class.hidden]="activePanel !== 'xml'">
        <app-xml-viewer [xml]="workflow.bpmnXml" />
      </div>
    </aside>
  </section>

  <div *ngIf="engineChoice" class="modal-backdrop" role="presentation">
    <section
      class="engine-dialog"
      role="dialog"
      aria-modal="true"
      aria-labelledby="engine-choice-title"
    >
      <h2 id="engine-choice-title">{{ engineChoice.title }}</h2>
      <label class="name-field">
        Name
        <input
          type="text"
          name="workflowName"
          [(ngModel)]="engineChoice.name"
          autocomplete="off"
          autofocus
        />
      </label>

      <p *ngIf="engineChoice.showEngine">{{ engineChoice.enginePrompt }}</p>

      <fieldset *ngIf="engineChoice.showEngine">
        <legend class="visually-hidden">Target engine</legend>
        <label>
          <input
            type="radio"
            name="engineType"
            [value]="engineType.CAMUNDA_7"
            [(ngModel)]="engineChoice.selectedEngineType"
          />
          Camunda 7
        </label>
        <label>
          <input
            type="radio"
            name="engineType"
            [value]="engineType.CAMUNDA_8"
            [(ngModel)]="engineChoice.selectedEngineType"
          />
          Camunda 8
        </label>
      </fieldset>

      <div class="dialog-actions">
        <button type="button" (click)="cancelEngineChoice()">Cancel</button>
        <button
          type="button"
          class="primary"
          [disabled]="!engineChoice.name.trim()"
          (click)="resolveEngineChoice()"
        >
          {{ engineChoice.submitLabel }}
        </button>
      </div>
    </section>
  </div>
</main>
