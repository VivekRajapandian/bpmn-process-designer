<main class="workspace">
  <app-toolbar
    [status]="workflow.status"
    (newDiagram)="newDiagram()"
    (importDiagram)="importDiagram($event)"
    (exportDiagram)="exportDiagram()"
    (save)="saveLocally()"
    (validate)="validate()"
    (undo)="undo()"
    (redo)="redo()"
    (zoomIn)="zoomIn()"
    (zoomOut)="zoomOut()"
  />

  <section class="body">
    <app-workflow-explorer
      [workflows]="samples"
      [activeWorkflowId]="workflow.id"
      (workflowSelected)="selectWorkflow($event)"
    />

    <section class="modeler">
      <div class="canvas-header">
        <div>
          <h1>Workflow: {{ workflow.name }}</h1>
          <p>{{ workflow.description }}</p>
        </div>
        <div class="workspace-meta">
          <span class="engine-label">Engine: {{ engineLabel(workflow.engineType) }}</span>
          <span *ngIf="saveMessage" class="save-message">{{ saveMessage }}</span>
          <span>Updated {{ workflow.updatedAt | date: 'short' }}</span>
        </div>
      </div>

      <app-bpmn-canvas />

      <app-problems-panel
        [problems]="problems"
        (problemSelected)="focusProblem($event)"
      />
    </section>

    <aside class="right-panel">
      <div class="tabs" role="tablist" aria-label="Inspector panels">
        <button
          type="button"
          [class.active]="activePanel === 'properties'"
          (click)="setPanel('properties')"
        >
          Properties
        </button>
        <button
          type="button"
          [class.active]="activePanel === 'xml'"
          (click)="setPanel('xml')"
        >
          XML
        </button>
      </div>

      <div class="panel-content" [class.hidden]="activePanel !== 'properties'">
        <app-properties-panel />
      </div>
      <div class="panel-content" [class.hidden]="activePanel !== 'xml'">
        <app-xml-viewer [xml]="workflow.bpmnXml" />
      </div>
    </aside>
  </section>

  <div *ngIf="engineChoice" class="modal-backdrop" role="presentation">
    <section
      class="engine-dialog"
      role="dialog"
      aria-modal="true"
      aria-labelledby="engine-choice-title"
    >
      <h2 id="engine-choice-title">{{ engineChoice.title }}</h2>
      <p>{{ engineChoice.prompt }}</p>

      <fieldset>
        <legend class="visually-hidden">Target engine</legend>
        <label>
          <input
            type="radio"
            name="engineType"
            [value]="engineType.CAMUNDA_7"
            [(ngModel)]="engineChoice.selected"
          />
          Camunda 7
        </label>
        <label>
          <input
            type="radio"
            name="engineType"
            [value]="engineType.CAMUNDA_8"
            [(ngModel)]="engineChoice.selected"
          />
          Camunda 8
        </label>
      </fieldset>

      <div class="dialog-actions">
        <button type="button" (click)="cancelEngineChoice()">Cancel</button>
        <button
          type="button"
          class="primary"
          (click)="resolveEngineChoice(engineChoice.selected)"
        >
          Continue
        </button>
      </div>
    </section>
  </div>
</main>
